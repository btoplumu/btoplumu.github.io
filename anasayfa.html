<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Erişimi Başarılı</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
        }

        .header { border-bottom: 2px solid #ff0000; padding: 10px; text-transform: uppercase; letter-spacing: 3px; }
        
        .dashboard { 
            margin-top: 50px; 
            border: 1px solid #ff0000; 
            padding: 2rem; 
            width: 80%; 
            max-width: 800px; 
            background: rgba(20, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .matrix-code { color: #880000; font-size: 0.9rem; margin-top: 20px; word-break: break-all; }

        .btn-logout { 
            margin-top: 30px; 
            background: transparent; 
            border: 1px solid #ff0000; 
            color: #ff0000; 
            padding: 10px 20px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1 class="header">SİSTEM ERİŞİMİ: GRANTED</h1>

    <div class="dashboard">
        <h2>HOŞ GELDİNİZ, OPERATÖR.</h2>
        <p>Tüm sistem protokolleri aktif. Güvenlik duvarı devre dışı bırakıldı.</p>
        <div class="matrix-code" id="matrix"></div>
    </div>

    <button class="btn-logout" onclick="window.location.href='index.html'">SİSTEMDEN ÇIKIŞ YAP</button>

    <script>
        // Rastgele kod akışı efekti
        const matrixDiv = document.getElementById('matrix');
        function generateCode() {
            let code = "";
            for(let i=0; i<300; i++) {
                code += Math.random().toString(36).substring(7) + " ";
            }
            matrixDiv.innerText = code;
        }
        setInterval(generateCode, 2000);
        generateCode();
    </script>
</body>
</html>
